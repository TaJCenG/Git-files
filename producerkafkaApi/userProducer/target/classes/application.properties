spring.application.name=userProducer
spring.kafka.producer.bootstrap-servers: localhost:9092
spring.kafka.producer.key-serializer: org.apache.kafka.common.serialization.StringSerializer
#spring.kafka.producer.value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.RETRY_BACKOFF_MS_CONFIG: 1000
spring.kafka.producer.ENABLE_IDEMPOTENCE_CONFIG: true
spring.kafka.producer.ACKS_CONFIG: All
spring.kafka.producer.RETRIES_CONFIG: 3
spring.kafka.producer.MAX_IN_FLIGHT_REQUESTS_PER_CONNECTION: 100000
spring.kafka.producer.DELIVERY_TIMEOUT_MS_CONFIG: 1000
spring.kafka.producer.RETRY_BACKOFF_MAX_MS_CONFIG: 1000