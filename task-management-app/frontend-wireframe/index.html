<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Task Management App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
<!-- Navigation Bar -->
<nav class="bg-blue-600 p-4">
    <div class="container mx-auto flex justify-between items-center">
        <h1 class="text-white text-2xl font-bold">Task Manager</h1>
        <div>
            <a href="#" class="text-white mr-4">Dashboard</a>
            <a href="#" class="text-white mr-4">My Tasks</a>
            <a href="#" class="text-white">Add Task</a>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="container mx-auto mt-8">
    <!-- Dashboard Header -->
    <div class="mb-6">
        <h2 class="text-3xl font-bold">Dashboard</h2>
        <p class="text-gray-600">Overview of your tasks and progress</p>
    </div>

    <!-- Task List -->
    <div class="bg-white shadow rounded p-6">
        <h3 class="text-xl font-semibold mb-4">My Tasks</h3>
        <table class="min-w-full divide-y divide-gray-200">
            <thead>
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Title</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Due Date</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Priority</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                <th class="px-6 py-3">Actions</th>
            </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
            <!-- Sample Row -->
            <tr>
                <td class="px-6 py-4 whitespace-nowrap">Design UI</td>
                <td class="px-6 py-4 whitespace-nowrap">2025-04-10</td>
                <td class="px-6 py-4 whitespace-nowrap text-red-500 font-bold">High</td>
                <td class="px-6 py-4 whitespace-nowrap">To Do</td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <button class="bg-blue-500 text-white px-3 py-1 rounded">Edit</button>
                    <button class="bg-red-500 text-white px-3 py-1 rounded">Delete</button>
                </td>
            </tr>
            <!-- More rows will be populated dynamically -->
            </tbody>
        </table>
    </div>

    <!-- Add Task Form -->
    <div class="mt-8 bg-white shadow rounded p-6">
        <h3 class="text-xl font-semibold mb-4">Add New Task</h3>
        <form id="addTaskForm">
            <div class="mb-4">
                <label class="block text-gray-700">Title</label>
                <input type="text" name="title" class="w-full border rounded px-3 py-2" placeholder="Task title" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700">Description</label>
                <textarea name="description" class="w-full border rounded px-3 py-2" placeholder="Task description"></textarea>
            </div>
            <div class="mb-4 flex space-x-4">
                <div class="flex-1">
                    <label class="block text-gray-700">Due Date</label>
                    <input type="date" name="dueDate" class="w-full border rounded px-3 py-2" required>
                </div>
                <div class="flex-1">
                    <label class="block text-gray-700">Priority</label>
                    <select name="priority" class="w-full border rounded px-3 py-2">
                        <option value="LOW">Low</option>
                        <option value="MEDIUM" selected>Medium</option>
                        <option value="HIGH">High</option>
                    </select>
                </div>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700">Status</label>
                <select name="status" class="w-full border rounded px-3 py-2">
                    <option value="TODO" selected>To Do</option>
                    <option value="IN_PROGRESS">In Progress</option>
                    <option value="DONE">Done</option>
                </select>
            </div>
            <button type="submit" class="bg-green-500 text-white px-4 py-2 rounded">Add Task</button>
        </form>
    </div>
</div>

<!-- Footer -->
<footer class="bg-gray-800 text-white text-center py-4 mt-12">
    &copy; 2025 Task Management App. All rights reserved.
</footer>

<!-- Optional: Include your JavaScript here -->
<script>
    // This script is a placeholder for form submission logic
    document.getElementById('addTaskForm').addEventListener('submit', function(e) {
        e.preventDefault();
        alert('Task added! (This is just a wireframe simulation.)');
        // In a real app, you would send a POST request to the backend API
    });
</script>
</body>
</html>
